<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="mechGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0a0e27"/>
  
  <!-- Mechanical gear ring -->
  <g stroke="url(#mechGrad)" stroke-width="1.5" fill="none">
    <circle cx="16" cy="16" r="12"/>
    <!-- Gear teeth -->
    <path d="M 16,4 L 16,6"/>
    <path d="M 23.5,7 L 22.5,8.5"/>
    <path d="M 28,16 L 26,16"/>
    <path d="M 23.5,25 L 22.5,23.5"/>
    <path d="M 16,28 L 16,26"/>
    <path d="M 8.5,25 L 9.5,23.5"/>
    <path d="M 4,16 L 6,16"/>
    <path d="M 8.5,7 L 9.5,8.5"/>
  </g>
  
  <!-- Central lock/key symbol (cryptography) -->
  <g fill="url(#mechGrad)">
    <!-- Lock body -->
    <rect x="12" y="16" width="8" height="8" rx="1"/>
    <!-- Lock shackle -->
    <path d="M 13,16 L 13,13 Q 13,10 16,10 Q 19,10 19,13 L 19,16" 
          stroke="url(#mechGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="16" cy="19" r="1.5" fill="#0a0e27"/>
    <rect x="15.3" y="19" width="1.4" height="3" fill="#0a0e27"/>
  </g>
  
  <!-- Tech accents -->
  <g opacity="0.6">
    <circle cx="16" cy="16" r="8" stroke="url(#mechGrad)" stroke-width="0.5" fill="none" stroke-dasharray="2,3"/>
  </g>
  
  <!-- Corner tech details -->
  <g stroke="url(#mechGrad)" stroke-width="1" opacity="0.5">
    <path d="M 5,5 L 7,5 L 7,7" fill="none" stroke-linecap="round"/>
    <path d="M 27,5 L 25,5 L 25,7" fill="none" stroke-linecap="round"/>
    <path d="M 5,27 L 7,27 L 7,25" fill="none" stroke-linecap="round"/>
    <path d="M 27,27 L 25,27 L 25,25" fill="none" stroke-linecap="round"/>
  </g>
</svg>